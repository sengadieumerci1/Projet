<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestion de Projet - Tâches</title>
<style>
body {font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4;}
header, footer {background:#007bff; color:white; text-align:center; padding:20px;}
nav {background:#0056b3; display:flex; justify-content:center; flex-wrap:wrap;}
nav a {color:white; padding:14px 20px; text-decoration:none;}
nav a:hover {background:#004494;}
main {padding:20px;}
.card {background:white; padding:20px; margin:20px 0; border-radius:8px; box-shadow:0 0 10px rgba(0,0,0,0.1);}
input, button {padding:10px; margin:5px 0;}
button {background:#007bff; color:white; border:none; border-radius:4px; cursor:pointer;}
button:hover {background:#0056b3;}
@media(max-width:600px){nav a{flex:100%; text-align:center;}}
</style>
</head>
<body>

<header>
    <h1>Tâches</h1>
</header>

<nav>
    <a href="index.html">Accueil</a>
    <a href="projets.html">Projets</a>
    <a href="equipe.html">Équipe</a>
    <a href="taches.html">Tâches</a>
    <a href="contact.html">Contact</a>
</nav>

<main>
    <div class="card">
        <h2>Gérer les tâches</h2>
        <input type="text" id="nouvelleTache" placeholder="Nouvelle tâche" />
        <button onclick="ajouterTache()">Ajouter</button>
        <ul id="listeTaches"></ul>
    </div>
</main>

<footer>
    &copy; 2026 Gestion de Projet
</footer>

<script>
function ajouterTache(){
    const input = document.getElementById("nouvelleTache");
    if(input.value.trim() !== ""){
        const ul = document.getElementById("listeTaches");
        const li = document.createElement("li");
        li.textContent = input.value;
        li.onclick = function(){ this.style.textDecoration = 'line-through'; };
        ul.appendChild(li);
        input.value = "";
    }
}
</script>

</body>
</html>
